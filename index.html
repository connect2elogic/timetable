<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans', sans-serif; }
        h1, h2 { font-family: 'Outfit', sans-serif; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div id="root" class="max-w-5xl mx-auto"></div>

    <script type="module">
        import React, { useState } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';

        function App() {
            const [step, setStep] = useState(1);
            const [config, setConfig] = useState({ days: 5, periods: 8 });
            const [teachers, setTeachers] = useState([]);
            const [schedule, setSchedule] = useState(null);

            // Scheduling Engine
            const generateSchedule = () => {
                const grid = Array.from({ length: config.days }, () => 
                    Array.from({ length: config.periods }, () => ({}))
                );
                
                // Simplified Greedy Assignment
                teachers.forEach(t => {
                    t.assignments.forEach(a => {
                        for(let i=0; i<a.hrs && i < (config.days * config.periods); i++) {
                            const day = Math.floor(i / config.periods);
                            const period = i % config.periods;
                            if (!grid[day][period][a.cls]) {
                                grid[day][period][a.cls] = { sub: a.sub, teacher: t.name };
                            }
                        }
                    });
                });
                setSchedule(grid);
                setStep(3);
            };

            return (
                <div class="bg-white p-8 rounded-sm shadow-sm border border-slate-200">
                    {step === 1 && (
                        <div class="space-y-6">
                            <h1 class="text-3xl font-bold">1. School Setup</h1>
                            <input type="number" placeholder="Days" class="border p-2 w-full" onChange={e => setConfig({...config, days: e.target.value})} />
                            <input type="number" placeholder="Periods" class="border p-2 w-full" onChange={e => setConfig({...config, periods: e.target.value})} />
                            <button onClick={() => setStep(2)} class="bg-black text-white px-6 py-2">Next</button>
                        </div>
                    )}
                    {step === 2 && (
                        <div class="space-y-6">
                            <h1 class="text-3xl font-bold">2. Teacher Assignments</h1>
                            <button onClick={() => setTeachers([...teachers, { name: '', assignments: [] }])} class="border px-4 py-2">+ Add Teacher</button>
                            {teachers.map((t, i) => (
                                <div key={i} class="border p-4">
                                    <input placeholder="Teacher Name" onChange={e => {
                                        const n = [...teachers]; n[i].name = e.target.value; setTeachers(n);
                                    }} />
                                    <button onClick={() => {
                                        const n = [...teachers]; n[i].assignments.push({cls: '', sub: '', hrs: 0}); setTeachers(n);
                                    }} class="text-sm underline ml-4">+ Assignment</button>
                                </div>
                            ))}
                            <button onClick={generateSchedule} class="bg-black text-white px-6 py-2">Generate Timetable</button>
                        </div>
                    )}
                    {step === 3 && schedule && (
                        <div class="space-y-6">
                            <h1 class="text-3xl font-bold no-print">3. Generated Matrix</h1>
                            <table class="w-full border-collapse border">
                                {schedule.map((day, d) => (
                                    <tr key={d}><td class="border p-2 font-bold">Day {d+1}</td>
                                        {day.map((p, pIdx) => <td key={pIdx} class="border p-2 text-xs">{Object.values(p)[0]?.sub || '-'}</td>)}
                                    </tr>
                                ))}
                            </table>
                            <button onClick={() => window.print()} class="no-print bg-slate-800 text-white px-6 py-2">Print PDF</button>
                            <button onClick={() => setStep(1)} class="no-print border px-6 py-2 ml-4">Start Over</button>
                        </div>
                    )}
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
