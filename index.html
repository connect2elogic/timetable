<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Timetable Architect</title>
    <style>
        :root { --bg: #0a0e17; --surface: #131a26; --accent: #06b6d4; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 2rem; }
        .container { max-width: 950px; margin: auto; }
        .card { background: var(--surface); padding: 2rem; border-radius: 20px; margin-bottom: 2rem; border: 1px solid #334155; }
        input { background: #1e293b; border: 1px solid #334155; padding: 0.8rem; border-radius: 8px; color: white; width: 100%; margin-top: 0.5rem; }
        button { padding: 0.6rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 0.2rem; }
        .btn-add { background: var(--accent); color: white; }
        .btn-del { background: #ef4444; color: white; }
        .btn-edit { background: #f59e0b; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th, td { border: 1px solid #334155; padding: 1rem; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Timetable Architect</h1>
        
        <div class="card">
            <h3>Add/Edit Teacher</h3>
            <input type="text" id="teacherName" placeholder="Teacher Name">
            <input type="number" id="weeklyHours" placeholder="Total Weekly Periods">
            <div id="workloadFields"></div>
            <button class="btn-add" onclick="addField()">+ Add Assignment</button>
            <button class="btn-add" style="background:#10b981;" onclick="saveTeacher()">Save Teacher</button>
        </div>

        <div class="card">
            <h3>Master Workload Registry</h3>
            <div id="displayArea"></div>
        </div>
    </div>

    <script>
        let registry = [];

        function addField() {
            const div = document.createElement('div');
            div.innerHTML = `<input type="text" class="c-val" placeholder="Class-Div"> <input type="text" class="s-val" placeholder="Subject">`;
            document.getElementById('workloadFields').appendChild(div);
        }

        function saveTeacher() {
            const teacher = {
                id: Date.now(),
                name: document.getElementById('teacherName').value,
                hours: document.getElementById('weeklyHours').value,
                assignments: []
            };
            document.querySelectorAll('#workloadFields > div').forEach(row => {
                teacher.assignments.push({ class: row.querySelector('.c-val').value, subject: row.querySelector('.s-val').value });
            });
            registry.push(teacher);
            render();
        }

        function deleteTeacher(id) {
            registry = registry.filter(t => t.id !== id);
            render();
        }

        function editTeacher(id) {
            const t = registry.find(item => item.id === id);
            document.getElementById('teacherName').value = t.name;
            document.getElementById('weeklyHours').value = t.hours;
            deleteTeacher(id); // Remove from list to allow re-saving
        }

        function render() {
            let html = `<table><tr><th>Teacher</th><th>Periods</th><th>Workload</th><th>Actions</th></tr>`;
            registry.forEach(t => {
                html += `<tr><td>${t.name}</td><td>${t.hours}</td>
                         <td>${t.assignments.map(a => a.class + ": " + a.subject).join(', ')}</td>
                         <td>
                            <button class="btn-edit" onclick="editTeacher(${t.id})">Edit</button>
                            <button class="btn-del" onclick="deleteTeacher(${t.id})">Delete</button>
                         </td></tr>`;
            });
            html += `</table>`;
            document.getElementById('displayArea').innerHTML = html;
        }
    </script>
</body>
</html>
