<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Timetable Generator</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #475569; background: #334155; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #475569; padding: 12px; text-align: center; }
        th { background: #334155; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #06b6d4; color: white; }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: auto;">
        <h1>🎓 Timetable Architect</h1>
        
        <div class="card">
            <h3>School Setup</h3>
            <input type="number" id="days" placeholder="Working Days">
            <input type="number" id="periods" placeholder="Periods per Day">
        </div>

        <div class="card">
            <h3>Add Teacher</h3>
            <input type="text" id="tName" placeholder="Teacher Name">
            <div id="workloadList"></div>
            <button class="btn" onclick="addAssignment()">+ Assignment</button>
            <button class="btn" style="background:#10b981" onclick="saveTeacher()">Save Teacher</button>
        </div>

        <button class="btn" style="width:100%; font-size:1.2rem;" onclick="generate()">Generate Timetable</button>
        <div id="output"></div>
    </div>

    <script>
        let teachers = [];

        function addAssignment() {
            const div = document.createElement('div');
            div.innerHTML = `<input class="c" placeholder="Class"> <input class="s" placeholder="Subject"> <input class="p" type="number" placeholder="Periods/Wk">`;
            document.getElementById('workloadList').appendChild(div);
        }

        function saveTeacher() {
            const t = {
                name: document.getElementById('tName').value,
                load: Array.from(document.querySelectorAll('#workloadList > div')).map(d => ({
                    cls: d.querySelector('.c').value,
                    sub: d.querySelector('.s').value,
                    hrs: parseInt(d.querySelector('.p').value)
                }))
            };
            teachers.push(t);
            document.getElementById('workloadList').innerHTML = '';
            document.getElementById('tName').value = '';
            alert("Teacher Saved!");
        }

        function generate() {
            const days = parseInt(document.getElementById('days').value);
            const periods = parseInt(document.getElementById('periods').value);
            const classes = [...new Set(teachers.flatMap(t => t.load.map(l => l.cls)))];

            let html = `<table><tr><th>Class</th>` + Array.from({length:periods}, (_,i) => `<th>P${i+1}</th>`).join('') + `</tr>`;

            classes.forEach(cls => {
                html += `<tr><td><b>${cls}</b></td>`;
                let assignments = teachers.flatMap(t => t.load.filter(l => l.cls === cls));
                
                for(let p = 0; p < periods; p++) {
                    let task = assignments.find(a => a.hrs > 0);
                    if(task) {
                        html += `<td>${task.sub}<br><small>${teachers.find(t=>t.load.includes(task)).name}</small></td>`;
                        task.hrs--;
                    } else {
                        html += `<td>-</td>`;
                    }
                }
                html += `</tr>`;
            });
            document.getElementById('output').innerHTML = html + `</table>`;
        }
    </script>
</body>
</html>
