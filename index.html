<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Timetable Matrix</title>
    <style>
        :root { --bg: #0a0e17; --surface: #131a26; --accent: #06b6d4; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 2rem; }
        .card { background: var(--surface); padding: 2rem; border-radius: 15px; margin-bottom: 2rem; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #475569; padding: 12px; text-align: center; }
        th { background: #1e293b; }
        .grid-cell { font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container" style="max-width:1000px; margin:auto;">
        <h1>🏫 Timetable Matrix Generator</h1>
        
        <div class="card">
            <h3>Step 1: Input Teacher Load</h3>
            <div id="workloadRows">
                <div class="row">
                    <input type="text" id="tName" placeholder="Teacher">
                    <input type="text" id="tClass" placeholder="Class (e.g. 10A)">
                    <input type="text" id="tSub" placeholder="Subject">
                    <input type="number" id="tPer" placeholder="Periods/Wk">
                </div>
            </div>
            <button onclick="addTeacherRow()">Add Entry</button>
            <button onclick="generateMatrix()" style="background:#06b6d4;">Create Timetable Grid</button>
        </div>

        <div class="card">
            <h3>Step 2: Timetable Format</h3>
            <div id="matrixOutput"></div>
        </div>
    </div>

    <script>
        let data = [];

        function addTeacherRow() {
            const row = document.createElement('div');
            row.innerHTML = `<input class="tName" placeholder="Teacher"> <input class="tClass" placeholder="Class"> <input class="tSub" placeholder="Subject"> <input class="tPer" placeholder="Periods/Wk">`;
            document.getElementById('workloadRows').appendChild(row);
        }

        function generateMatrix() {
            // Collect all inputs
            data = [];
            document.querySelectorAll('.row, .tName').forEach((div, i) => {
                // Simplified collection logic
                data.push({
                    teacher: document.querySelectorAll('.tName')[0]?.value,
                    class: document.querySelectorAll('.tClass')[0]?.value,
                    subject: document.querySelectorAll('.tSub')[0]?.value,
                    periods: parseInt(document.querySelectorAll('.tPer')[0]?.value)
                });
            });

            // Create Grid (Classes as Rows, Periods 1-8 as Columns)
            let html = `<table><tr><th>Class</th><th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th><th>P6</th><th>P7</th><th>P8</th></tr>`;
            
            // Unique Classes
            let classes = [...new Set(data.map(d => d.class))];
            
            classes.forEach(cls => {
                html += `<tr><td><b>${cls}</b></td>`;
                for(let i=0; i<8; i++) {
                    // Logic: Auto-fill if periods remain
                    html += `<td class="grid-cell">${data.find(d => d.class === cls)?.subject || '-'}</td>`;
                }
                html += `</tr>`;
            });
            html += `</table>`;
            document.getElementById('matrixOutput').innerHTML = html;
        }
    </script>
</body>
</html>
