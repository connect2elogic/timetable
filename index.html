<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional School Timetable Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 5px; border-radius: 6px; border: 1px solid #475569; background: #334155; color: white; width: 150px; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 6px; border: none; background: #06b6d4; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; }
        th, td { border: 1px solid #475569; padding: 12px; text-align: center; }
        th { background: #334155; }
        .row-item { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: auto;">
        <h1>🎓 Timetable Generator</h1>
        
        <div class="card">
            <h3>1. School Setup</h3>
            <input type="number" id="days" placeholder="Working Days">
            <input type="number" id="periods" placeholder="Periods per Day">
        </div>

        <div class="card">
            <h3>2. Teacher Workload</h3>
            <input type="text" id="tName" placeholder="Teacher Name">
            <div id="assignments"></div>
            <button onclick="addAssignment()">+ Add Class & Subject</button>
            <button style="background:#10b981" onclick="saveTeacher()">Save Teacher</button>
        </div>

        <button style="width:100%; padding:15px; background:#6366f1; font-size:1.1rem" onclick="generateTimetable()">Generate Final Timetable</button>
        <div id="output"></div>
    </div>

    <script>
        let teachers = [];

        function addAssignment() {
            const div = document.createElement('div');
            div.className = "row-item";
            div.innerHTML = `<input class="cls" placeholder="Class-Div"> <input class="sub" placeholder="Subject"> <input class="hrs" type="number" placeholder="Weekly Periods">`;
            document.getElementById('assignments').appendChild(div);
        }

        function saveTeacher() {
            const t = {
                name: document.getElementById('tName').value,
                load: Array.from(document.querySelectorAll('.row-item')).map(d => ({
                    cls: d.querySelector('.cls').value,
                    sub: d.querySelector('.sub').value,
                    hrs: parseInt(d.querySelector('.hrs').value)
                }))
            };
            teachers.push(t);
            document.getElementById('assignments').innerHTML = '';
            document.getElementById('tName').value = '';
            alert("Teacher data saved!");
        }

        function generateTimetable() {
            const days = parseInt(document.getElementById('days').value);
            const periods = parseInt(document.getElementById('periods').value);
            const classes = [...new Set(teachers.flatMap(t => t.load.map(l => l.cls)))];
            
            let html = `<h2>Master School Timetable</h2>`;
            classes.forEach(cls => {
                html += `<h3>Class: ${cls}</h3><table><tr><th>Day</th>` + 
                        Array.from({length:periods}, (_,i) => `<th>Period ${i+1}</th>`).join('') + `</tr>`;
                
                let classTasks = teachers.flatMap(t => t.load.filter(l => l.cls === cls));
                
                for(let d = 1; d <= days; d++) {
                    html += `<tr><td>Day ${d}</td>`;
                    for(let p = 1; p <= periods; p++) {
                        let task = classTasks.find(t => t.hrs > 0);
                        if(task) {
                            html += `<td>${task.sub}</td>`;
                            task.hrs--;
                        } else {
                            html += `<td>-</td>`;
                        }
                    }
                    html += `</tr>`;
                }
                html += `</table>`;
            });
            document.getElementById('output').innerHTML = html;
        }
    </script>
</body>
</html>
