<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Timetable Generator</title>
    <style>
        :root { --bg: #0a0e17; --surface: #131a26; --accent: #06b6d4; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 2rem; }
        .card { background: var(--surface); padding: 2rem; border-radius: 20px; margin-bottom: 2rem; border: 1px solid #334155; }
        input { background: #1e293b; border: 1px solid #334155; padding: 0.8rem; border-radius: 8px; color: white; width: 100%; margin-top: 0.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: center; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; background: var(--accent); color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Timetable Generator</h1>
        
        <div class="card">
            <h3>1. School Configuration</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <input type="number" id="days" placeholder="Working Days (e.g. 5)">
                <input type="number" id="periods" placeholder="Periods per Day (e.g. 8)">
                <input type="text" id="breakAfter" placeholder="Break after period (e.g. 4)">
            </div>
            <button class="btn" onclick="generateGrid()" style="margin-top:1rem;">Generate Empty Timetable</button>
        </div>

        <div class="card">
            <h3>2. Generated Timetable</h3>
            <div id="timetableOutput"></div>
        </div>
    </div>

    <script>
        function generateGrid() {
            const days = document.getElementById('days').value;
            const periods = document.getElementById('periods').value;
            const breakAfter = parseInt(document.getElementById('breakAfter').value);
            
            let html = `<table><tr><th>Day</th>`;
            for(let i=1; i<=periods; i++) {
                html += `<th>P-${i}</th>`;
                if(i === breakAfter) html += `<th>Break</th>`;
            }
            html += `</tr>`;

            for(let d=1; d<=days; d++) {
                html += `<tr><td>Day ${d}</td>`;
                for(let p=1; p<=periods; p++) {
                    html += `<td><input type="text" placeholder="Subject/Class"></td>`;
                    if(p === breakAfter) html += `<td style="background:#334155;">BREAK</td>`;
                }
                html += `</tr>`;
            }
            html += `</table>`;
            document.getElementById('timetableOutput').innerHTML = html;
        }
    </script>
</body>
</html>
